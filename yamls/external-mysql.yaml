apiVersion: v1
kind: Service
metadata:
  name: windows-mysql-service
spec:
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Endpoints
metadata:
  name: windows-mysql-service # Must exactly match the Service name above
subsets:
  - addresses:
      - ip: 192.168.1.50 # CHANGE THIS to your private Windows machine's LAN IP
    ports:
      - port: 3306

