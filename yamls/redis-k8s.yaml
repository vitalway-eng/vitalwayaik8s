apiVersion: v1
kind: Namespace
metadata:
  name: vitalwayai
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: vitalwayai
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  externalIPs:
    - 192.168.8.54
  selector:
    app: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-statefulset
  namespace: vitalwayai
  labels:
    app: redis
spec:
  serviceName: "redis-service"
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:8.0-alpine
        command: ["redis-server", "--requirepass", "Vtw123$%^", "--appendonly", "yes"]
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
      namespace: vitalwayai
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "longhorn-redis-storage"
      resources:
        requests:
          storage: 20Gi

