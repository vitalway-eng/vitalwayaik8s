apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infereollama-pvc
  namespace: vitalwayai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: infereollama-replicaset
  namespace: vitalwayai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infereollama
  template:
    metadata:
      namespace: vitalwayai
      labels:
        app: infereollama
    spec:
      containers:
      - name: infereollama
        image: ghcr.io/vitalway-eng/vitalaiollama:1.0
        imagePullPolicy: Always
        env:
          - name: OLLAMA_HOST
            value: "192.168.8.54"
          - name: OLLAMA_MODEL
            value: "gpt-oss:20b"
          - name: REDIS_HOST
            value: "192.168.8.54"
          - name: REDIS_PORT
            value: "6379"
          - name: REDIS_PASSWORD
            value: "Vtw123$%^"
          - name: REDIS_USERNAME
            value: "default"
        volumeMounts:
        - name: storage-volume
          mountPath: /data
      imagePullSecrets:
      - name: github-registry-pull-secret
      hostAliases:
      - ip: "192.168.8.54"
        hostnames:
        - "gx10-3fe2"
      volumes:
      - name: storage-volume
        persistentVolumeClaim:
          claimName: infereollama-pvc
